<!DOCTYPE html>
<html>

<body style="font-family: Arial, sans-serif;">
    <div style="max-width: 600px; margin: auto; border: 1px solid #ddd; padding: 20px;">
        <h2 style="color: #4CAF50;">Xác thực mã OTP</h2>
        <p>Chào bạn,</p>
        <p>Mã xác thực (OTP) của bạn là:</p>
        <div
            style="font-size: 24px; font-weight: bold; color: #333; letter-spacing: 5px; padding: 10px; background: #f4f4f4; text-align: center;">
            <span th:text="${otpCode}">123456</span>
        </div>
        <p>Mã này sẽ hết hạn trong vòng 5 phút. Vui lòng không chia sẻ mã này cho bất kỳ ai.</p>
        <hr>
        <p style="font-size: 12px; color: #888;">Đây là email tự động, vui lòng không phản hồi.</p>
    </div>
</body>

</html>
